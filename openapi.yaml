openapi: 3.0.3
info:
  title: Group 2 Movie and TV Review API
  description: |
    Backend API for TCSS 460 Group 2.

    Sprint 0 exposes a public heartbeat endpoint and API documentation.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://group-2-9289.onrender.com/
    description: Production deployment

tags:
  - name: Health
    description: Public service status routes
  - name: Movies
    description: Movie data routes proxied from TMDB
  - name: Shows
    description: TV show data routes proxied from TMDB

paths:
  /health:
    get:
      tags: [Health]
      summary: Heartbeat
      description: Returns a simple JSON response confirming the API is running.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: group-project-backend-group-2-3
                required:
                  - status
                  - service

  /movies/{id}:
    get:
      tags: [Movies]
      summary: Get movie details by TMDB ID
      description: Returns a transformed movie detail response for a single movie.
      parameters:
        - in: path
          name: id
          required: true
          description: Positive TMDB movie ID.
          schema:
            type: integer
            minimum: 1
            example: 550
      responses:
        '200':
          description: Movie details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 550
                  title:
                    type: string
                    example: Fight Club
                  year:
                    type: integer
                    nullable: true
                    example: 1999
                  posterUrl:
                    type: string
                    nullable: true
                    example: https://image.tmdb.org/t/p/w500/poster.jpg
                  backdropUrl:
                    type: string
                    nullable: true
                    example: https://image.tmdb.org/t/p/w780/backdrop.jpg
                  overview:
                    type: string
                    example: An insomniac office worker crosses paths with a soap maker.
                  genres:
                    type: array
                    items:
                      type: string
                    example: [Drama]
                  runtimeMinutes:
                    type: integer
                    nullable: true
                    example: 139
                  status:
                    type: string
                    example: Released
                  rating:
                    type: number
                    format: float
                    example: 8.4
                required:
                  - id
                  - title
                  - year
                  - posterUrl
                  - backdropUrl
                  - overview
                  - genres
                  - runtimeMinutes
                  - status
                  - rating
              example:
                id: 550
                title: Fight Club
                year: 1999
                posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                backdropUrl: https://image.tmdb.org/t/p/w780/backdrop.jpg
                overview: An insomniac office worker crosses paths with a soap maker.
                genres: [Drama]
                runtimeMinutes: 139
                status: Released
                rating: 8.4
        '404':
          description: Movie not found or invalid movie ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Movie not found
                required:
                  - error
              examples:
                invalidId:
                  summary: Invalid path parameter
                  value:
                    error: Movie not found
                notFound:
                  summary: Valid ID with no matching TMDB movie
                  value:
                    error: The resource you requested could not be found.
        '502':
          description: Upstream TMDB request failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB request failed with status 500
                required:
                  - error
              example:
                error: TMDB request failed with status 500

  /shows/{id}:
    get:
      tags: [Shows]
      summary: Get TV show details by TMDB ID
      description: Returns a transformed show detail response for a single TV series.
      parameters:
        - in: path
          name: id
          required: true
          description: Positive TMDB TV show ID.
          schema:
            type: integer
            minimum: 1
            example: 1396
      responses:
        '200':
          description: TV show details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1396
                  title:
                    type: string
                    example: Breaking Bad
                  year:
                    type: integer
                    nullable: true
                    example: 2008
                  posterUrl:
                    type: string
                    nullable: true
                    example: https://image.tmdb.org/t/p/w500/poster.jpg
                  backdropUrl:
                    type: string
                    nullable: true
                    example: https://image.tmdb.org/t/p/w780/backdrop.jpg
                  overview:
                    type: string
                    example: A high school chemistry teacher turned methamphetamine manufacturer.
                  genres:
                    type: array
                    items:
                      type: string
                    example: [Drama]
                  seasonCount:
                    type: integer
                    example: 5
                  episodeCount:
                    type: integer
                    example: 62
                  status:
                    type: string
                    example: Ended
                  rating:
                    type: number
                    format: float
                    example: 8.9
                required:
                  - id
                  - title
                  - year
                  - posterUrl
                  - backdropUrl
                  - overview
                  - genres
                  - seasonCount
                  - episodeCount
                  - status
                  - rating
              example:
                id: 1396
                title: Breaking Bad
                year: 2008
                posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                backdropUrl: https://image.tmdb.org/t/p/w780/backdrop.jpg
                overview: A high school chemistry teacher turned methamphetamine manufacturer.
                genres: [Drama]
                seasonCount: 5
                episodeCount: 62
                status: Ended
                rating: 8.9
        '404':
          description: Show not found or invalid show ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Show not found
                required:
                  - error
              examples:
                invalidId:
                  summary: Invalid path parameter
                  value:
                    error: Show not found
                notFound:
                  summary: Valid ID with no matching TMDB TV show
                  value:
                    error: The resource you requested could not be found.
        '502':
          description: Upstream TMDB request failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: TMDB request failed
                required:
                  - error
              examples:
                upstreamError:
                  summary: TMDB returned an error status
                  value:
                    error: TMDB request failed with status 500
                genericUpstreamFailure:
                  summary: Network or unexpected failure when calling TMDB
                  value:
                    error: TMDB request failed
