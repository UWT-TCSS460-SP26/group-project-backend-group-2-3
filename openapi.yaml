openapi: 3.0.3
info:
  title: Group 2 Movie and TV Review API
  description: |
    Backend API for TCSS 460 Group 2.

    Sprint 0 exposes a public heartbeat endpoint and API documentation.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://group-2-9289.onrender.com/
    description: Production deployment

tags:
  - name: Health
    description: Public service status routes

paths:
  /health:
    get:
      tags: [Health]
      summary: Heartbeat
      description: Returns a simple JSON response confirming the API is running.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: group-project-backend-group-2
                required:
                  - status
                  - service
