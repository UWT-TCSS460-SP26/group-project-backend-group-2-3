openapi: 3.0.3
info:
  title: Group 2 Movie and TV Review API
  version: 0.1.0
  description: |
    Backend API for TCSS 460 Group 2 Sprint 1.
    The API proxies TMDB and returns transformed responses.

servers:
  - url: https://group-2-9289.onrender.com
    description: Production deployment
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Service health checks
  - name: Movies
    description: Movie routes proxied from TMDB
  - name: Shows
    description: TV show routes proxied from TMDB
  - name: Reviews
    description: User review routes for movies and shows

paths:
  /health:
    get:
      tags: [Health]
      summary: Heartbeat
      description: Returns a simple JSON response confirming the API is running.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: group-project-backend-group-2-3

  /api/v1/movies/search:
    get:
      tags: [Movies]
      summary: Search movies by title
      description: Searches TMDB for movies and returns a transformed paginated list.
      parameters:
        - in: query
          name: q
          required: true
          description: Movie title query.
          schema:
            type: string
            minLength: 1
          example: Fight Club
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        '200':
          description: Paginated list of matching movies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaListResponse'
              examples:
                success:
                  value:
                    page: 1
                    totalPages: 5
                    totalResults: 92
                    results:
                      - id: 550
                        title: Fight Club
                        year: 1999
                        posterUrl: https://image.tmdb.org/t/p/w500/example.jpg
                        overview: An insomniac office worker crosses paths with a soap maker.
                        mediaType: movie
        '400':
          description: Missing or invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                missingQ:
                  value:
                    error: Query parameter q is required
                invalidPage:
                  value:
                    error: Query parameter page must be a positive integer
        '502':
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                upstreamFailure:
                  value:
                    error: TMDB request failed with status 500
                genericFailure:
                  value:
                    error: Internal server error

  /api/v1/movies/popular:
    get:
      tags: [Movies]
      summary: Get popular movies
      description: Returns popular TMDB movies as a transformed paginated list.
      parameters:
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        '200':
          description: Paginated list of popular movies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaListResponse'
              examples:
                success:
                  value:
                    page: 1
                    totalPages: 500
                    totalResults: 10000
                    results:
                      - id: 550
                        title: Fight Club
                        year: 1999
                        posterUrl: https://image.tmdb.org/t/p/w500/example.jpg
                        overview: An insomniac office worker crosses paths with a soap maker.
                        mediaType: movie
        '400':
          description: Invalid page parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                invalidPage:
                  value:
                    error: Query parameter page must be a positive integer
        '502':
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                upstreamFailure:
                  value:
                    error: TMDB request failed with status 500
                genericFailure:
                  value:
                    error: Internal server error

  /api/v1/movies/{id}:
    get:
      tags: [Movies]
      summary: Get movie details by id
      description: Returns transformed details for a single movie.
      parameters:
        - in: path
          name: id
          required: true
          description: Positive movie id.
          schema:
            type: integer
            minimum: 1
          example: 550
      responses:
        '200':
          description: Movie details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieDetailResponse'
              examples:
                success:
                  value:
                    id: 550
                    title: Fight Club
                    year: 1999
                    posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                    backdropUrl: https://image.tmdb.org/t/p/w780/backdrop.jpg
                    overview: An insomniac office worker crosses paths with a soap maker.
                    genres: [Drama]
                    runtimeMinutes: 139
                    status: Released
                    rating: 8.4
        '404':
          description: Movie not found or invalid movie ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                invalidId:
                  value:
                    error: Movie not found
                notFound:
                  value:
                    error: The resource you requested could not be found.
        '502':
          description: Upstream TMDB request failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                upstreamError:
                  value:
                    error: TMDB request failed with status 500
                genericFailure:
                  value:
                    error: Internal server error

  /api/v1/shows/search:
    get:
      tags: [Shows]
      summary: Search shows by title
      description: Searches TMDB TV shows and returns a transformed paginated list.
      parameters:
        - in: query
          name: q
          required: true
          description: Show title query.
          schema:
            type: string
            minLength: 1
          example: lost
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        '200':
          description: Paginated list of matching shows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaListResponse'
              examples:
                success:
                  value:
                    page: 1
                    totalPages: 2
                    totalResults: 40
                    results:
                      - id: 4607
                        title: Lost
                        year: 2004
                        posterUrl: https://image.tmdb.org/t/p/w500/ogbwjg3we0UppYjVJwVH15BReqA.jpg
                        overview: The survivors of a plane crash are forced to work together in order to survive on a seemingly deserted tropical island.
                        mediaType: show
        '400':
          description: Missing or invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                missingQ:
                  value:
                    error: q is required
                invalidPage:
                  value:
                    error: page must be a positive integer
        '502':
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                upstreamFailure:
                  value:
                    error: Invalid API key
                genericFailure:
                  value:
                    error: Internal server error

  /api/v1/shows/popular:
    get:
      tags: [Shows]
      summary: Get popular shows
      description: Returns popular TMDB TV shows as a transformed paginated list.
      parameters:
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        '200':
          description: Paginated list of popular shows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaListResponse'
              examples:
                success:
                  value:
                    page: 1
                    totalPages: 1000
                    totalResults: 20000
                    results:
                      - id: 95557
                        title: Invincible
                        year: 2021
                        posterUrl: https://image.tmdb.org/t/p/w500/yDWJYRAwMNKbIYT8ZB33qy84uzO.jpg
                        overview: An adult animated series based on the Skybound/Image comic about a teenager whose father is the most powerful superhero on the planet.
                        mediaType: show
        '400':
          description: Invalid page parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                invalidPage:
                  value:
                    error: page must be a positive integer
        '502':
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                upstreamFailure:
                  value:
                    error: Invalid API key
                genericFailure:
                  value:
                    error: Internal server error

  /api/v1/shows/{id}:
    get:
      tags: [Shows]
      summary: Get show details by id
      description: Returns transformed details for a single TV show.
      parameters:
        - in: path
          name: id
          required: true
          description: Positive show id.
          schema:
            type: integer
            minimum: 1
          example: 1396
      responses:
        '200':
          description: Show details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowDetailResponse'
              examples:
                success:
                  value:
                    id: 1396
                    title: Breaking Bad
                    year: 2008
                    posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                    backdropUrl: https://image.tmdb.org/t/p/w780/backdrop.jpg
                    overview: A high school chemistry teacher turned methamphetamine manufacturer.
                    genres: [Drama]
                    seasonCount: 5
                    episodeCount: 62
                    status: Ended
                    rating: 8.9
        '404':
          description: Show not found or invalid show ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                invalidId:
                  value:
                    error: Show not found
                notFound:
                  value:
                    error: The resource you requested could not be found.
        '502':
          description: Upstream TMDB request failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                upstreamError:
                  value:
                    error: TMDB request failed with status 500
                genericUpstreamFailure:
                  value:
                    error: TMDB request failed

  /api/v1/reviews:
    get:
      tags: [Reviews]
      summary: List reviews
      description: Returns paginated reviews with optional media and author filters.
      parameters:
        - in: query
          name: tmdbId
          required: false
          description: Positive TMDB id filter.
          schema:
            type: integer
            minimum: 1
          example: 550
        - in: query
          name: mediaType
          required: false
          description: Filter by media type.
          schema:
            type: string
            enum: [movie, show]
          example: movie
        - in: query
          name: userId
          required: false
          description: Positive user id filter.
          schema:
            type: integer
            minimum: 1
          example: 1
        - in: query
          name: page
          required: false
          description: Positive integer page number. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - in: query
          name: pageSize
          required: false
          description: Positive integer page size up to 50. Defaults to 10.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          example: 10
      responses:
        '200':
          description: Paginated review list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
              examples:
                success:
                  value:
                    page: 1
                    pageSize: 1
                    totalPages: 1
                    totalResults: 1
                    results:
                      - id: 101
                        tmdbId: 550
                        mediaType: movie
                        title: Great watch
                        body: This movie stayed sharp, focused, and worth revisiting.
                        createdAt: '2026-04-26T18:30:00.000Z'
                        updatedAt: '2026-04-26T18:30:00.000Z'
                        author:
                          id: 1
                          username: reviews-int-owner
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                invalidMediaType:
                  value:
                    error: Query parameter mediaType must be either movie or show
                invalidPageSize:
                  value:
                    error: Query parameter pageSize must be 50 or less
    post:
      tags: [Reviews]
      summary: Create review
      description: Creates a review for a movie or show. One review per user per item.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
            examples:
              success:
                value:
                  tmdbId: 550
                  mediaType: movie
                  title: Great watch
                  body: This movie stayed sharp, focused, and worth revisiting.
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
              examples:
                success:
                  value:
                    id: 101
                    tmdbId: 550
                    mediaType: movie
                    title: Great watch
                    body: This movie stayed sharp, focused, and worth revisiting.
                    createdAt: '2026-04-26T18:30:00.000Z'
                    updatedAt: '2026-04-26T18:30:00.000Z'
                    author:
                      id: 1
                      username: reviews-int-owner
        '400':
          description: Invalid review payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                invalidTmdbId:
                  value:
                    error: tmdbId must be a positive integer
                invalidBody:
                  value:
                    error: body must be between 10 and 5000 characters
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                missingAuth:
                  value:
                    error: Missing or malformed Authorization header
        '409':
          description: Duplicate review for the same user and item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                duplicate:
                  value:
                    error: You have already reviewed this item

  /api/v1/reviews/{id}:
    get:
      tags: [Reviews]
      summary: Get review by id
      description: Returns one review by its internal id.
      parameters:
        - in: path
          name: id
          required: true
          description: Positive review id.
          schema:
            type: integer
            minimum: 1
          example: 101
      responses:
        '200':
          description: Review found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
              examples:
                success:
                  value:
                    id: 101
                    tmdbId: 550
                    mediaType: movie
                    title: Great watch
                    body: This movie stayed sharp, focused, and worth revisiting.
                    createdAt: '2026-04-26T18:30:00.000Z'
                    updatedAt: '2026-04-26T18:30:00.000Z'
                    author:
                      id: 1
                      username: reviews-int-owner
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                notFound:
                  value:
                    error: Review not found
    put:
      tags: [Reviews]
      summary: Update review
      description: Updates the title and body for a review owned by the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Positive review id.
          schema:
            type: integer
            minimum: 1
          example: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewUpdateRequest'
            examples:
              success:
                value:
                  title: Great watch
                  body: This movie stayed sharp, focused, and worth revisiting.
      responses:
        '200':
          description: Review updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Invalid review payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                invalidBody:
                  value:
                    error: body must be between 10 and 5000 characters
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: User does not own the review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                forbidden:
                  value:
                    error: You do not have permission to modify this resource
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                notFound:
                  value:
                    error: Review not found
    delete:
      tags: [Reviews]
      summary: Delete review
      description: Deletes a review owned by the authenticated user or an admin.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Positive review id.
          schema:
            type: integer
            minimum: 1
          example: 101
      responses:
        '204':
          description: Review deleted
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: User does not own the review and is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                forbidden:
                  value:
                    error: You do not have permission to modify this resource
        '404':
          description: Review not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                notFound:
                  value:
                    error: Review not found

