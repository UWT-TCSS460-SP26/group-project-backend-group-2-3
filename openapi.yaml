openapi: 3.0.3
info:
  title: Group 2 Movie and TV Review API
  description: |
    Backend API for TCSS 460 Group 2.

    Sprint 0 exposes a public heartbeat endpoint and API documentation.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://group-2-9289.onrender.com/
    description: Production deployment

tags:
  - name: Health
    description: Public service status routes
  - name: Movies
    description: Movie search and discovery routes

paths:
  /movies/search:
    get:
      tags: [Movies]
      summary: Search movies by title
      description: Searches TMDB for movies matching the given title and returns a transformed paginated list. Raw TMDB fields are never exposed.
      parameters:
        - name: q
          in: query
          required: true
          description: The movie title to search for
          schema:
            type: string
          example: Fight Club
        - name: page
          in: query
          required: false
          description: Page number of results to return. Must be a positive integer. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        '200':
          description: Paginated list of matching movies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaListResponse'
              example:
                page: 1
                totalPages: 5
                totalResults: 92
                results:
                  - id: 550
                    title: Fight Club
                    year: 1999
                    posterUrl: https://image.tmdb.org/t/p/w500/example.jpg
                    overview: An insomniac office worker crosses paths with a soap maker.
                    mediaType: movie
        '400':
          description: Missing or invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingQ:
                  summary: Missing q parameter
                  value:
                    error: Query parameter q is required
                invalidPage:
                  summary: Invalid page parameter
                  value:
                    error: Query parameter page must be a positive integer
        '502':
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: TMDB request failed with status 500

  /movies/popular:
    get:
      tags: [Movies]
      summary: Get popular movies
      description: Returns the current list of popular movies from TMDB as a transformed paginated list. Raw TMDB fields are never exposed.
      parameters:
        - name: page
          in: query
          required: false
          description: Page number of results to return. Must be a positive integer. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
      responses:
        '200':
          description: Paginated list of popular movies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaListResponse'
              example:
                page: 1
                totalPages: 500
                totalResults: 10000
                results:
                  - id: 1396
                    title: Breaking Bad
                    year: 2008
                    posterUrl: https://image.tmdb.org/t/p/w500/example.jpg
                    overview: A chemistry teacher diagnosed with cancer turns to manufacturing drugs.
                    mediaType: movie
        '400':
          description: Invalid page parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Query parameter page must be a positive integer
        '502':
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: TMDB request failed with status 500

  /health:
    get:
      tags: [Health]
      summary: Heartbeat
      description: Returns a simple JSON response confirming the API is running.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: group-project-backend-group-2-3
                required:
                  - status
                  - service

components:
  schemas:
    MediaListItem:
      type: object
      required: [id, title, year, posterUrl, overview, mediaType]
      properties:
        id:
          type: integer
          description: TMDB numeric ID
          example: 550
        title:
          type: string
          description: Movie title
          example: Fight Club
        year:
          type: integer
          nullable: true
          description: Year extracted from release date, null if unavailable
          example: 1999
        posterUrl:
          type: string
          nullable: true
          description: Full poster image URL at w500 size, null if no poster
          example: https://image.tmdb.org/t/p/w500/example.jpg
        overview:
          type: string
          description: Short movie description
          example: An insomniac office worker crosses paths with a soap maker.
        mediaType:
          type: string
          enum: [movie]
          description: Always "movie" for movie results

    MediaListResponse:
      type: object
      required: [page, totalPages, totalResults, results]
      properties:
        page:
          type: integer
          description: Current page number
          example: 1
        totalPages:
          type: integer
          description: Total number of pages available
          example: 5
        totalResults:
          type: integer
          description: Total number of results across all pages
          example: 92
        results:
          type: array
          items:
            $ref: '#/components/schemas/MediaListItem'

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
          example: Query parameter q is required
