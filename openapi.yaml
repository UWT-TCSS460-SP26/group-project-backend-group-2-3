                    results:
                      - id: 95557
                        title: Invincible
                        year: 2021
                        posterUrl: https://image.tmdb.org/t/p/w500/yDWJYRAwMNKbIYT8ZB33qy84uzO.jpg
                        overview: An adult animated series based on the Skybound/Image comic about a teenager whose father is the most powerful superhero on the planet.
                        mediaType: show
        '400':
          description: Invalid page parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                invalidPage:
                  value:
                    error: page must be a positive integer
        '502':
          description: TMDB upstream failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                upstreamFailure:
                  value:
                    error: Invalid API key
                genericFailure:
                  value:
                    error: Internal server error

  /api/v2/tv-shows/{id}:
    get:
      tags: [Shows]
      summary: Get show details by id
      description: Returns transformed details for a single TV show.
      parameters:
        - in: path
          name: id
          required: true
          description: Positive show id.
          schema:
            type: integer
            minimum: 1
          example: 1396
      responses:
        '200':
          description: Show details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowDetailResponse'
              examples:
                success:
                  value:
                    id: 1396
                    title: Breaking Bad
                    year: 2008
                    posterUrl: https://image.tmdb.org/t/p/w500/poster.jpg
                    backdropUrl: https://image.tmdb.org/t/p/w780/backdrop.jpg
                    overview: A high school chemistry teacher turned methamphetamine manufacturer.
                    genres: [Drama]
                    seasonCount: 5
                    episodeCount: 62
                    status: Ended
                    rating: 8.9
        '404':
          description: Show not found or invalid show ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                invalidId:
                  value:
                    error: Show not found
                notFound:
                  value:
                    error: The resource you requested could not be found.
        '502':
          description: Upstream TMDB request failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                upstreamError:
                  value:
                    error: TMDB request failed with status 500
                genericUpstreamFailure:
                  value:
                    error: TMDB request failed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Internal server error

    ReviewAuthor:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: reviews-int-owner

    ReviewResponse:
      type: object
      required:
        - id
        - tmdbId
        - mediaType
        - title
        - body
        - createdAt
        - updatedAt
        - author
      properties:
        id:
          type: integer
          example: 101
        tmdbId:
          type: integer
          example: 550
        mediaType:
          type: string
          enum: [movie, show]
          example: movie
        title:
          type: string
          nullable: true
          example: Great watch
        body:
          type: string
          example: This movie stayed sharp, focused, and worth revisiting.
        createdAt:
          type: string
          format: date-time
          example: '2026-04-26T18:30:00.000Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-04-26T18:30:00.000Z'
        author:
          $ref: '#/components/schemas/ReviewAuthor'

    ReviewListResponse:
      type: object
      required:
        - page
        - pageSize
        - totalPages
        - totalResults
        - results
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10
        totalPages:
          type: integer
          example: 1
        totalResults:
          type: integer
          example: 1
        results:
          type: array
          items:
            $ref: '#/components/schemas/ReviewResponse'

    ReviewCreateRequest:
      type: object
      required:
        - tmdbId
        - mediaType
        - body
      properties:
        tmdbId:
          type: integer
          minimum: 1
          example: 550
        mediaType:
          type: string
          enum: [movie, show]
          example: movie
        title:
          type: string
          nullable: true
          maxLength: 120
          example: Great watch
        body:
          type: string
          minLength: 10
          maxLength: 5000
          example: This movie stayed sharp, focused, and worth revisiting.

    ReviewUpdateRequest:
      type: object
      required:
        - body
      properties:
        title:
          type: string
          nullable: true
          maxLength: 120
          example: Great watch
        body:
          type: string
          minLength: 10
          maxLength: 5000
          example: This movie stayed sharp, focused, and worth revisiting.

    MediaListItem:
